---
- name: Bootstrap HA VM for Portainer-managed stacks
  hosts: tofu_hosts
  become: true
  gather_facts: true

  vars:
    portainer_agent_image: "portainer/agent:2.33.2"
    portainer_agent_port: 9001

  tasks:
    - name: Install base packages (NFS client + prereqs)
      ansible.builtin.apt:
        update_cache: true
        name:
          - nfs-common
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create Docker keyring dir
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: "0644"
        force: true

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker engine + compose plugin
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Run Portainer Agent container
      community.docker.docker_container:
        name: portainer_agent
        image: "{{ portainer_agent_image }}"
        restart_policy: always
        published_ports:
          - "{{ portainer_agent_port }}:9001"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /var/lib/docker/volumes:/var/lib/docker/volumes
        state: started